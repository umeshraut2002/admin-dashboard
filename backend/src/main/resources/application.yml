server:
  port: ${PORT:8080}

spring:
  application:
    name: admin-dashboard-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${AWS_RDS_HOST:localhost}:${AWS_RDS_PORT:3306}/${AWS_RDS_DB_NAME:admin_dashboard}?useSSL=${AWS_RDS_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${AWS_RDS_USERNAME:admin}}
    password: ${SPRING_DATASOURCE_PASSWORD:${AWS_RDS_PASSWORD:admin123}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
